interface:
  display_name: "PR Shepherd"
  short_description: "Loop review-swarm, review-triage, and approval-gate until the PR reaches a terminal state"
  default_prompt: "Use $pr-shepherd on this PR. Each iteration: re-swarm on new pushes, triage unresolved threads, and run the approval gate once quiet — until the PR is merged, closed, or parked with a human."
