# Filename note: `agents/openai.yaml` is the agent-host interface descriptor read
# by the OpenAI/Codex agent host. The name refers to that host harness, NOT the
# provider this skill targets (DeepAgents / LangChain via dcode). Every sibling
# runner skill uses the same `agents/openai.yaml` filename; keep it for host
# discovery.
interface:
  display_name: "Dcode Runner (DeepAgents)"
  short_description: "Run workspace prompts through DeepAgents CLI (dcode)"
  default_prompt: "Use $dcode-runner to execute this task with DeepAgents CLI (dcode) from the current workspace using the user's already-configured model."
